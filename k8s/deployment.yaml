apiVersion: apps/v1
kind: Deployment

metadata:
  name: java-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: java-app

  template:

    metadata:
      labels:
        app: java-app

    spec:
      containers:

      - name: java-app

        image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/java-app:d4f32337f72eff20af2c99b59d09a8682363af89

        ports:
        - containerPort: 8080
