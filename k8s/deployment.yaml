apiVersion: apps/v1
kind: Deployment

metadata:
  name: java-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: java-app

  template:
    metadata:
      labels:
        app: java-app

    spec:
      containers:
      - name: java-app
        image: 505342112116.dkr.ecr.ap-south-1.amazonaws.com/java-app:1e47e91381c96543d0b5db116066924e42eed9fe
        ports:
        - containerPort: 8080
