name: CI Pipeline

on:
  push:
    branches:
      - main
permissions:
  contents: write

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: java-app
  IMAGE_TAG: ${{ github.sha }}

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build Maven Project
      run: mvn clean package

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v3
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to ECR
      run: |
        aws ecr get-login-password --region $AWS_REGION \
        | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

    - name: Build Docker Image
      run: docker build -t java-app:$IMAGE_TAG .

    - name: Tag Image
      run: |
        docker tag java-app:$IMAGE_TAG \
        ${{ secrets.ECR_REGISTRY }}/java-app:$IMAGE_TAG

    - name: Push Image
      run: |
        docker push ${{ secrets.ECR_REGISTRY }}/java-app:$IMAGE_TAG

    - name: Update K8s Image
      run: |
        sed -i "s|IMAGE_TAG|$IMAGE_TAG|g" k8s/deployment.yaml

    - name: Commit Changes
      run: |
        git config --global user.email "madhumalleala111@gmail.com"
        git config --global user.name "madhumallela"
        git add k8s/deployment.yaml
        git commit -m "Update image tag"
        git push
